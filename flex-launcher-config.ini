[General]
DefaultMenu=Main
VSync=true
OnLaunch=Main
WrapEntries=true
MouseSelect=true
InhibitOSScreensaver=true

[Background]
Mode=Color
Color=#0f0f1a

[Layout]
MaxButtons=4
IconSize=180
IconSpacing=8%
VCenter=50%

[Titles]
Enabled=true
Font=/usr/local/share/flex-launcher/assets/fonts/OpenSans-Regular.ttf
FontSize=22
Color=#FFFFFF
Opacity=100%
Shadows=true
ShadowColor=#000000
OversizeMode=Shrink
Padding=15

[Highlight]
Enabled=true
FillColor=#6B4E9B
FillOpacity=35%
OutlineSize=3
OutlineColor=#e94560
OutlineOpacity=100%
CornerRadius=16
VPadding=25
HPadding=25

[Scroll Indicators]
Enabled=true
FillColor=#FFFFFF
OutlineSize=0
OutlineColor=#000000
Opacity=60%

[Gamepad]
Enabled=false
DeviceIndex=-1
ButtonA=:select
ButtonB=:back
ButtonDPadLeft=:left
ButtonDPadRight=:right
ButtonDPadUp=:up
ButtonDPadDown=:down

[Hotkeys]
Hotkey1=#1B;:quit
Hotkey2=#0D;:select
Hotkey3=#08;:back

[Screensaver]
Enabled=true
IdleTime=300
Intensity=80%

[Main]
Entry1=Jellyfin;/home/your-username/.config/flex-launcher/icons/jellyfin.png;/home/your-username/bin/show-jellyfin.sh
Entry2=Games;/home/your-username/.config/flex-launcher/icons/games.png;/home/your-username/bin/show-games.sh

