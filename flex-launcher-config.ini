[General]
DefaultMenu=Main
VSync=true
OnLaunch=Blank
WrapEntries=true
MouseSelect=true
InhibitOSScreensaver=true

[Background]
Mode=Color
Color=#0f0f1a

[Layout]
MaxButtons=2
IconSize=350
IconSpacing=12%
VCenter=45%

[Titles]
Enabled=true
Font=/usr/local/share/flex-launcher/assets/fonts/OpenSans-Regular.ttf
FontSize=32
Color=#FFFFFF
Opacity=100%
Shadows=true
ShadowColor=#000000
OversizeMode=Shrink
Padding=15

[Highlight]
Enabled=true
FillColor=#6B4E9B
FillOpacity=35%
OutlineSize=3
OutlineColor=#e94560
OutlineOpacity=100%
CornerRadius=16
VPadding=25
HPadding=25

[Gamepad]
Enabled=true
DeviceIndex=-1
ButtonA=:select
ButtonB=:none
ButtonDPadLeft=:left
ButtonDPadRight=:right

[Hotkeys]
Hotkey1=#1B;:quit

[Screensaver]
Enabled=true
IdleTime=300
Intensity=80%

[Main]
Entry1=Jellyfin;/home/your-username/.config/flex-launcher/icons/jellyfin.png;/home/your-username/bin/launch-jmp.sh
Entry2=Games;/home/your-username/.config/flex-launcher/icons/games.png;flatpak run com.moonlight_stream.Moonlight --fullscreen
