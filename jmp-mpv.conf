# =============================================================================
# jmp-mpv.conf — mpv overrides loaded by Jellyfin Media Player's embedded mpv
# =============================================================================
# JMP ships its own mpv internally. This file is placed at:
#   ~/.config/jellyfinmediaplayer/mpv.conf
# (or referenced via JMP's "other_conf" setting)
#
# JMP already handles vo, hwdec, cache, etc. via jellyfinmediaplayer.conf,
# so only A/V sync tweaks belong here — anything else may conflict.
# =============================================================================

# --- A/V Sync ---
# Compensate for Pi 5 HDMI audio pipeline latency (~300ms).
# Without this, audio arrives late and lips are out of sync.
# video-sync=audio locks the video clock to the audio clock for stability.
audio-delay=-0.3
video-sync=audio
