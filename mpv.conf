# =============================================================================
# mpv.conf — Standalone mpv configuration for Raspberry Pi 5
# =============================================================================
# Used when mpv is launched directly (not via Jellyfin Media Player).
# Optimized for Pi 5 BCM2712 SoC with V4L2 M2M hardware decoder.
# =============================================================================

# --- Video Output ---
# vo=gpu uses Mesa V3D OpenGL on Pi 5 (VideoCore VII GPU).
# gpu-context=wayland is required since we run under labwc (wlroots compositor).
# hwdec=v4l2m2m-copy uses the Pi 5's stateless V4L2 hardware decoder, then
# copies frames to GPU memory. The "-copy" variant avoids direct-render issues
# with Mesa and is the most stable path on Pi 5 (avoids green frames / crashes).
# fs=yes starts fullscreen — this is a TV appliance, no window chrome needed.
vo=gpu
gpu-context=wayland
hwdec=v4l2m2m-copy
fs=yes

# --- Audio ---
# ao=alsa bypasses PulseAudio/PipeWire for lowest latency to HDMI.
# audio-device targets HDMI-A-2 (vc4hdmi1) — the second HDMI port on Pi 5.
# Pi 5 has two HDMI ports: vc4hdmi0 (HDMI-A-1, micro) and vc4hdmi1 (HDMI-A-2, micro).
# Stereo output avoids multi-channel decode issues on the Pi's HDMI audio path.
# Volume pinned at 100% — the TV handles volume control via CEC or remote.
ao=alsa
audio-device=alsa/hdmi:CARD=vc4hdmi1,DEV=0
audio-channels=stereo
volume=100

# --- A/V Sync ---
# audio-delay=-0.3 compensates for the ~300ms HDMI audio pipeline latency on Pi 5.
# This is a known issue: ALSA HDMI output on BCM2712 introduces noticeable lag.
# video-sync=audio locks video frame timing to the audio clock, preventing drift.
# Together these ensure lips match speech. Adjust audio-delay if your TV differs.
audio-delay=-0.3
video-sync=audio

# --- Cache / Buffering ---
# Generous cache for network streams (Jellyfin over HTTP). The Pi 5 has 8GB RAM
# so 2GB forward + 2GB back is safe and prevents rebuffering on unstable WiFi.
# demuxer-readahead-secs=600 pre-reads up to 10 minutes ahead.
# cache-pause-initial=yes pauses playback briefly at start to fill the buffer.
# cache-pause-wait=3 pauses if buffer drops below 3 seconds of content.
cache=yes
demuxer-max-bytes=2GiB
demuxer-max-back-bytes=2GiB
demuxer-readahead-secs=600
cache-secs=600
cache-pause-initial=yes
cache-pause-wait=3

# --- IPC Socket ---
# Exposes mpv's JSON IPC protocol at /tmp/mpv-socket for external control.
# Used by: media-buffer-manager, unified-controller.py, jmp-ctl.py, home-button-daemon.
input-ipc-server=/tmp/mpv-socket

# --- OSD ---
# Hide all on-screen display elements. This is a lean TV appliance —
# seek bars and text overlays are distracting on a living room screen.
# The Jellyfin web UI provides its own progress/seek display.
osd-level=0
osd-bar=no
